name: "react ci pipeline"

on:
    push:
        branches:
            - main
            - master
    pull_request:
        branches:
            - main
            - master

permissions:
    contents: read

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: "clone the repo"
              uses: actions/checkout@v4

            - name: "set up node"
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: "check node version"
              run: node --version

            - name: "listing directories"
              run: ls

            - name: "install dependencies"
              run: npm ci || npm install

            - name: "listing directories"
              run: ls

            - name: "running lint"
              run: npm run lint

            - name: "testing"
              run: npm run test --if-present

            - name: "build"
              run: npm run build

            - name: "upload project ready build file"
              uses: actions/upload-artifact@v4
              with:
                name: build
                path: dist
                if-no-files-found: error

